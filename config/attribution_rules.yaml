# Attribution Rules Template
#
# This file allows you to define custom rules for transaction attribution.
# Replace the example entries with your own merchant-specific rules.
#
# Format:
# MERCHANT_NAME:
#   PersonName:
#     category: category_name
#     split_ratio: 0.5  # 0.0 to 1.0, where 0.5 means 50/50 split
#
# Example entries:
rules:
  EXAMPLE RESTAURANT:
    Person1:
      category: dining
      split_ratio: 0.5
    Person2:
      category: dining
      split_ratio: 0.5

  EXAMPLE SUBSCRIPTION:
    Person1:
      category: subscriptions
      split_ratio: 1.0